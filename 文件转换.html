<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件后缀批量转换工具</title>
    <!-- 引入ZIP打包依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        /* 可拖拽面板 */
        .panel {
            position: fixed;
            width: 280px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            z-index: 9999;
            overflow: hidden;
            transition: all 0.3s ease, opacity 0.3s ease;
            display: none;
            opacity: 0;
        }
        .panel.show {
            display: block;
            opacity: 1;
        }
        .panel-header {
            padding: 14px 16px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }
        .panel-header h3 {
            font-size: 15px;
            font-weight: 600;
        }
        .panel-close {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .panel-body {
            padding: 18px;
        }
        .form-item{margin-bottom:14px;}
        .form-item label{display:block;margin-bottom:6px;font-size:13px;color:#555;}
        .form-item input, .form-item select{width:100%;height:38px;padding:0 10px;border:1px solid #e1e4e8;border-radius:8px;}
        .btn {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        .btn-warning {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        /* 悬浮按钮 */
        #openAdminBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            box-shadow: 0 6px 20px rgba(52,152,219,0.4);
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
        }
        #openAdminBtn:hover {
            transform: scale(1.05);
        }
        /* 页面主体 */
        header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 28px 0;
            text-align: center;
            border-radius: 0 0 20px 20px;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        section {
            background: white;
            padding: 28px;
            margin-bottom: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        section h2 {
            color: #2c3e50;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
        }
        .convert-box {
            text-align: center;
            padding: 20px 0;
        }
        /* 后缀设置样式 */
        .ext-set {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .ext-item {
            text-align: left;
        }
        .ext-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }
        .ext-item input {
            width: 180px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            font-size: 14px;
        }
        .ext-item input:focus {
            outline: none;
            border-color: #3498db;
        }
        .ext-item input.error {
            border-color: #e74c3c;
        }
        .convert-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 12px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .convert-btn:hover {
            transform: translateY(-2px);
        }
        .convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        #fileSelect { display: none; }
        .file-tips { color: #666; margin: 16px 0; }
        /* 选中文件列表区域 */
        .selected-file-wrap{
            background:#f8f9fa;
            border-radius:10px;
            padding:14px;
            margin:16px 0;
            max-height:220px;
            overflow-y:auto;
            text-align:left;
        }
        .selected-file-wrap h4{
            font-size:14px;
            color:#2c3e50;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items: center;
        }
        .selected-file-wrap h4 span{color:#3498db;}
        .file-item{
            font-size:13px;
            padding:6px 8px;
            background:#fff;
            border-radius:6px;
            margin-bottom:6px;
            border:1px solid #eee;
        }
        .empty-tip{
            color:#999;
            font-size:13px;
            text-align:center;
            padding:10px;
        }
        /* 主界面进度条 */
        .progress-container {
            max-width: 600px;
            margin: 20px auto;
            text-align: left;
        }
        .progress-text {
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-wrap {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #27ae60);
            transition: width 0.3s ease;
        }
        /* 终端日志 */
        .terminal-record {
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .record-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #3498db;
        }
        .record-item.error {
            border-left: 3px solid #e74c3c;
            background: #fdecea;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<!-- 悬浮按钮 -->
<button id="openAdminBtn" title="打开日志面板">⚙️</button>

<!-- 身份验证面板 -->
<div class="panel" id="authPanel" style="top:120px;right:20px;">
    <div class="panel-header">
        <h3>身份验证</h3>
        <button class="panel-close" onclick="closePanel('authPanel')">×</button>
    </div>
    <div class="panel-body">
        <div class="form-item">
            <label>选择身份</label>
            <select id="userType">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="form-item" id="pwdBox">
            <label>管理员密码</label>
            <input type="password" id="adminPwd" placeholder="请输入">
        </div>
        <button class="btn btn-primary" id="authBtn">确认登录</button>
    </div>
</div>

<!-- 操作日志面板 -->
<div class="panel" id="convertTerminal" style="top:380px;left:20px;">
    <div class="panel-header">
        <h3>实时操作日志</h3>
        <button class="panel-close" onclick="closePanel('convertTerminal')">×</button>
    </div>
    <div class="panel-body">
        <div class="terminal-record" id="operRecord">
            <h4>操作日志</h4>
            <p style="text-align:center;color:#999;">暂无记录</p>
        </div>
        <button class="btn btn-danger" id="clearRecord">清空日志</button>
    </div>
</div>

<!-- 页面主体 -->
<header>
    <h1>文件后缀批量转换工具</h1>
    <p>✅ 仅修改后缀 | ✅ 内容不变 | ✅ 批量打包下载</p>
</header>

<div class="container">
    <section id="convert">
        <h2>开始文件转换</h2>
        <!-- 后缀设置（主界面） -->
        <div class="ext-set">
            <div class="ext-item">
                <label>源文件后缀（例：.df）</label>
                <input type="text" id="sourceExt" value=".df">
            </div>
            <div class="ext-item">
                <label>目标后缀（例：.txt）</label>
                <input type="text" id="targetExt" value=".txt">
            </div>
        </div>

        <div class="convert-box">
            <input type="file" id="fileSelect" multiple>
            <button class="convert-btn" id="selectFileBtn">📂 选择文件</button>
            <button class="convert-btn" id="clearFileBtn">🗑️ 清空文件</button>
            <button class="convert-btn" id="startConvertBtn">🚀 开始转换</button>
            <p class="file-tips">支持多选文件，转换后打包为ZIP下载</p>

            <!-- 选中文件实时展示区域 -->
            <div class="selected-file-wrap" id="selectedFileBox">
                <h4>已选择文件列表 <span id="selectCount">(0个)</span></h4>
                <div id="fileListDom" class="empty-tip">尚未选择任何文件</div>
            </div>
            
            <!-- 主界面进度条 -->
            <div class="progress-container">
                <div class="progress-text">
                    <span id="currentFile">等待转换...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="help">
        <h2>使用说明</h2>
        <p>1. 输入源后缀和目标后缀（支持 sm / .sm 自动格式化）</p>
        <p>2. 选择需要转换的文件，页面实时展示列表</p>
        <p>3. 可手动清空已选文件，转换中禁止重复操作</p>
        <p>4. 自动校验文件格式，异常信息实时展示在日志中</p>
    </section>
</div>

<footer>
    <p>© 2026 文件后缀转换工具 | 本地操作 安全无忧</p>
</footer>

<script>
    // ===================== 核心配置 =====================
    const ADMIN_PASSWORD = '1112220dofa';
    let selectedFiles = [];
    let isAdminLogin = false;
    let isConverting = false; // 转换状态锁，防重复点击

    // DOM元素缓存
    const selectedFileBox = document.getElementById('selectedFileBox');
    const fileListDom = document.getElementById('fileListDom');
    const selectCount = document.getElementById('selectCount');
    const fileSelect = document.getElementById('fileSelect');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const clearFileBtn = document.getElementById('clearFileBtn');
    const startConvertBtn = document.getElementById('startConvertBtn');
    const sourceExt = document.getElementById('sourceExt');
    const targetExt = document.getElementById('targetExt');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const currentFile = document.getElementById('currentFile');
    const operRecord = document.getElementById('operRecord');

    // ===================== 工具函数 =====================
    /** 标准化后缀格式：自动补全. */
    function formatExt(ext) {
        ext = ext.trim().replace(/\s+/g, '');
        if (!ext) return '';
        return ext.startsWith('.') ? ext : `.${ext}`;
    }

    /** 校验后缀合法性 */
    function checkExtValid() {
        const src = formatExt(sourceExt.value);
        const tar = formatExt(targetExt.value);

        // 清空错误样式
        sourceExt.classList.remove('error');
        targetExt.classList.remove('error');

        // 空值校验
        if (!src) {
            addLog('❌ 源文件后缀不能为空', true);
            sourceExt.classList.add('error');
            return false;
        }
        if (!tar) {
            addLog('❌ 目标后缀不能为空', true);
            targetExt.classList.add('error');
            return false;
        }
        // 后缀相同校验
        if (src.toLowerCase() === tar.toLowerCase()) {
            addLog('❌ 源后缀和目标后缀不能相同', true);
            sourceExt.classList.add('error');
            targetExt.classList.add('error');
            return false;
        }
        return true;
    }

    /** 渲染文件列表 */
    function renderFileList(arr) {
        selectCount.textContent = `(${arr.length}个)`;
        if (arr.length === 0) {
            fileListDom.className = 'empty-tip';
            fileListDom.innerText = '尚未选择任何文件';
            return;
        }
        fileListDom.className = '';
        let html = '';
        arr.forEach(item => {
            html += `<div class="file-item">${item.name}</div>`;
        });
        fileListDom.innerHTML = html;
    }

    /** 重置进度条 */
    function resetProgress() {
        progressBar.style.width = '0%';
        progressPercent.textContent = '0%';
        currentFile.textContent = '等待转换...';
    }

    /** 添加日志（支持错误样式） */
    function addLog(text, isError = false) {
        const time = new Date().toLocaleTimeString();
        const className = isError ? 'record-item error' : 'record-item';
        const logItem = `<div class="${className}"><p>${time}：${text}</p></div>`;
        
        if (operRecord.innerHTML.includes('暂无')) {
            operRecord.innerHTML = '<h4>操作日志</h4>';
        }
        operRecord.innerHTML += logItem;
        operRecord.scrollTop = operRecord.scrollHeight;
    }

    /** 文件去重：根据文件名+大小去重 */
    function uniqueFiles(files) {
        const map = new Map();
        files.forEach(file => {
            const key = `${file.name}_${file.size}`;
            map.set(key, file);
        });
        return Array.from(map.values());
    }

    // ===================== 面板操作 =====================
    document.querySelectorAll('.panel-header').forEach(header => {
        const panel = header.parentElement;
        let isDrag = false, offsetX, offsetY;
        header.onmousedown = (e) => {
            isDrag = true;
            offsetX = e.clientX - panel.offsetLeft;
            offsetY = e.clientY - panel.offsetTop;
        };
        document.onmousemove = (e) => {
            if (!isDrag) return;
            panel.style.left = `${e.clientX - offsetX}px`;
            panel.style.top = `${e.clientY - offsetY}px`;
            panel.style.right = 'auto';
        };
        document.onmouseup = () => isDrag = false;
    });

    function closePanel(id) {
        document.getElementById(id).classList.remove('show');
    }

    function showPanel(id) {
        document.getElementById(id).classList.add('show');
    }

    // 打开日志面板
    document.getElementById('openAdminBtn').onclick = () => {
        isAdminLogin ? showPanel('convertTerminal') : showPanel('authPanel');
    };

    // ===================== 身份验证 =====================
    const userType = document.getElementById('userType');
    const adminPwd = document.getElementById('adminPwd');
    const pwdBox = document.getElementById('pwdBox');
    const authBtn = document.getElementById('authBtn');

    userType.onchange = () => {
        pwdBox.style.display = userType.value === 'user' ? 'none' : 'block';
        adminPwd.value = '';
    };

    authBtn.onclick = () => {
        if (userType.value === 'admin') {
            if (adminPwd.value === ADMIN_PASSWORD) {
                isAdminLogin = true;
                closePanel('authPanel');
                showPanel('convertTerminal');
                addLog('✅ 管理员登录成功');
            } else {
                addLog('❌ 管理员密码错误', true);
                alert('密码错误！');
            }
        } else {
            closePanel('authPanel');
        }
    };

    // ===================== 文件操作 =====================
    // 选择文件
    selectFileBtn.onclick = () => fileSelect.click();
    fileSelect.onchange = (e) => {
        try {
            if (isConverting) return; // 转换中禁止选择文件
            let files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 文件去重
            files = uniqueFiles(files);
            selectedFiles = files;
            
            addLog(`📂 已选择 ${selectedFiles.length} 个文件`);
            resetProgress();
            renderFileList(selectedFiles);
        } catch (err) {
            addLog(`❌ 选择文件失败：${err.message}`, true);
        }
    };

    // 清空已选文件
    clearFileBtn.onclick = () => {
        if (isConverting) return;
        selectedFiles = [];
        renderFileList([]);
        resetProgress();
        fileSelect.value = ''; // 重置文件选择器
        addLog('🗑️ 已清空所有选中文件');
    };

    // ===================== 核心转换功能（完善逻辑+异常捕获） =====================
    startConvertBtn.onclick = async () => {
        // 状态锁：防止重复转换
        if (isConverting) return;
        isConverting = true;
        startConvertBtn.disabled = true;
        selectFileBtn.disabled = true;
        clearFileBtn.disabled = true;

        try {
            // 1. 基础校验
            if (!checkExtValid()) return;
            if (selectedFiles.length === 0) {
                addLog('❌ 请先选择需要转换的文件', true);
                return;
            }

            const srcExt = formatExt(sourceExt.value);
            const tarExt = formatExt(targetExt.value);
            const total = selectedFiles.length;
            const zip = new JSZip();
            let matchCount = 0; // 匹配后缀的文件数量

            resetProgress();
            addLog(`🔄 开始处理，共${total}个文件，目标后缀：${srcExt}→${tarExt}`);

            // 2. 遍历处理文件
            for (let i = 0; i < total; i++) {
                const file = selectedFiles[i];
                currentFile.textContent = `处理中：${file.name}`;
                
                // 校验文件是否匹配源后缀
                const reg = new RegExp(`\\${srcExt}$`, 'i');
                if (!reg.test(file.name)) {
                    addLog(`⚠️ 跳过不匹配文件：${file.name}`, true);
                    continue;
                }

                // 替换后缀并加入压缩包
                const newFileName = file.name.replace(reg, tarExt);
                zip.file(newFileName, file);
                matchCount++;

                // 更新进度
                const percent = Math.round(((i + 1) / total) * 100);
                progressBar.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
                await new Promise(resolve => setTimeout(resolve, 50));
            }

            // 3. 结果校验
            if (matchCount === 0) {
                addLog(`❌ 未找到任何匹配${srcExt}后缀的文件`, true);
                return;
            }

            // 4. 生成并下载ZIP
            await zip.generateAsync({ type: 'blob' }).then(content => {
                saveAs(content, `转换文件_${new Date().getTime()}.zip`);
                addLog(`✅ 转换完成！成功处理 ${matchCount} 个文件`);
            });

        } catch (err) {
            // 全局异常捕获
            addLog(`❌ 转换失败：${err.message}`, true);
        } finally {
            // 无论成功失败，重置状态
            isConverting = false;
            startConvertBtn.disabled = false;
            selectFileBtn.disabled = false;
            clearFileBtn.disabled = false;
            // 清空文件列表
            selectedFiles = [];
            renderFileList([]);
            resetProgress();
            fileSelect.value = '';
        }
    };

    // ===================== 日志清空 =====================
    document.getElementById('clearRecord').onclick = () => {
        if (confirm('确定清空所有操作日志？')) {
            operRecord.innerHTML = '<h4>操作日志</h4><p style="text-align:center;color:#999;">暂无记录</p>';
        }
    };
</script>
</body>
</html>
